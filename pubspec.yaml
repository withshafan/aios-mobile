name: aios_mobile
description: AIOS Mobile - Your AI Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.2
  provider: ^6.1.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  http: ^1.2.2
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  process_run: ^1.1.0
  path_provider: ^2.1.4
  file_picker: ^8.1.4
  permission_handler: ^11.3.1
  pdf: ^3.11.0
  open_file: ^3.5.0
  uuid: ^4.5.1
  math_expressions: ^2.5.0
  mailer: ^6.1.0
  webview_flutter: ^4.10.0
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  fl_chart: ^0.68.0
  graphview: ^1.2.0
  fuzzy: ^0.5.1
  url_launcher: ^6.3.0
  flutter_secure_storage: ^9.2.2
  excel: ^4.0.6
  flutter_js: ^0.8.7
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assests/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assests/icon/
